name: Quality Gate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: arb_scanner
          POSTGRES_PASSWORD: test
          POSTGRES_DB: arb_scanner
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run mypy src/ --strict

      - name: Run migrations
        run: uv run arb-scanner migrate
        env:
          DATABASE_URL: postgresql://arb_scanner:test@localhost:5432/arb_scanner

      - name: Tests with coverage
        run: uv run pytest tests/ -x --tb=short --cov=src/arb_scanner --cov-fail-under=70
        env:
          DATABASE_URL: postgresql://arb_scanner:test@localhost:5432/arb_scanner
