name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  quality-gate:
    uses: ./.github/workflows/quality-gate.yml

  build:
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/arb-scanner
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            sleep 10
            for i in 1 2 3; do
              if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi
              echo "Health check attempt $i failed, retrying..."
              sleep 5
            done
            echo "Health check failed after 3 attempts"
            exit 1

      - name: Notify success
        if: success()
        run: |
          if [ -n "${{ secrets.DEPLOY_SLACK_WEBHOOK_URL }}" ]; then
            curl -sf -X POST "${{ secrets.DEPLOY_SLACK_WEBHOOK_URL }}" \
              -H 'Content-Type: application/json' \
              -d "{\"text\": \":white_check_mark: Deploy succeeded — \`${{ github.sha }}\`\n${{ github.event.head_commit.message }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
          fi

      - name: Notify failure
        if: failure()
        run: |
          if [ -n "${{ secrets.DEPLOY_SLACK_WEBHOOK_URL }}" ]; then
            curl -sf -X POST "${{ secrets.DEPLOY_SLACK_WEBHOOK_URL }}" \
              -H 'Content-Type: application/json' \
              -d "{\"text\": \":x: Deploy FAILED — \`${{ github.sha }}\`\n${{ github.event.head_commit.message }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
          fi
