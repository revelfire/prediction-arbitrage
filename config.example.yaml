venues:
  polymarket:
    gamma_base_url: "https://gamma-api.polymarket.com"
    clob_base_url: "https://clob.polymarket.com"
    enabled: true
    rate_limit_per_sec: 10
  kalshi:
    base_url: "https://api.elections.kalshi.com/trade-api/v2"
    enabled: true
    rate_limit_per_sec: 5  # Kalshi Basic tier: 10 reads/sec, keep headroom

claude:
  model: "claude-sonnet-4-20250514"
  api_key: "${ANTHROPIC_API_KEY}"
  batch_size: 5
  match_cache_ttl_hours: 24

embedding:
  enabled: true
  provider: "local"
  model: "BAAI/bge-small-en-v1.5"
  cosine_threshold: 0.60
  dimensions: 384
  # To use Voyage AI instead:
  # provider: "voyage"
  # model: "voyage-3-lite"
  # api_key: "${VOYAGE_API_KEY}"
  # dimensions: 512

scanning:
  interval_seconds: 60
  mode: "continuous"

arb_thresholds:
  min_net_spread_pct: 0.02
  min_size_usd: 10
  thin_liquidity_threshold: 50

notifications:
  slack_webhook: "${SLACK_WEBHOOK_URL}"
  discord_webhook: "${DISCORD_WEBHOOK_URL}"
  enabled: true
  min_spread_to_notify_pct: 0.02

trend_alerts:
  enabled: true
  window_size: 10
  convergence_threshold_pct: 0.25
  divergence_threshold_pct: 0.50
  cooldown_minutes: 15
  max_consecutive_failures: 3
  zero_opp_alert_scans: 5

dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8000

flippening:
  enabled: false
  sports:
    - nba
    - nhl
    - nfl
    - mlb
    - epl
    - ufc
  spike_threshold_pct: 0.15
  spike_window_minutes: 10
  min_confidence: 0.60
  reversion_target_pct: 0.70
  stop_loss_pct: 0.15
  base_position_usd: 100.0
  max_position_usd: 500.0
  max_hold_minutes: 45
  pre_game_window_minutes: 30
  ws_reconnect_max_seconds: 60
  late_join_penalty: 0.80
  polling_interval_seconds: 5.0
  confidence_weights:
    magnitude: 0.45
    strength: 0.30
    speed: 0.25
  sport_overrides:
    nfl:
      spike_threshold_pct: 0.12
      confidence_modifier: 1.1
    nba:
      spike_threshold_pct: 0.15
      confidence_modifier: 1.0

storage:
  database_url: "${DATABASE_URL}"

logging:
  level: "INFO"
  format: "json"

fees:
  polymarket:
    maker_fee_pct: 0.0
    taker_fee_pct: 0.0
    fee_model: "on_winnings"
  kalshi:
    maker_fee_pct: 0.0
    taker_fee_pct: 0.07
    fee_model: "per_contract"
    fee_cap: 0.07
